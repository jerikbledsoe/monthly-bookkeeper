<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Bookkeeper</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: #B8B8B8;
      color: #1a1a1a;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --bg-primary: #FFFFFF;
      --bg-card: #FFFFFF;
      --bg-subtle: #F8F9FA;
      --bg-muted: #E9ECEF;
      --text-primary: #1a1a1a;
      --text-secondary: #495057;
      --text-muted: #64748B;
      --text-subtle: #94A3B8;
      --accent: #5856D6;
      --accent-light: #7C7AE6;
      --positive: #5AC8C8;
      --positive-dark: #3BA8A8;
      --negative: #E57373;
      --negative-dark: #C54949;
      --border: #E9ECEF;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    }

    .card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      transition: box-shadow 0.2s ease;
    }
    .card:hover { box-shadow: var(--shadow-lg); }

    .tab-bar { background: var(--bg-muted); padding: 4px; border-radius: 12px; }
    .tab-active { background: var(--bg-card); color: var(--accent); box-shadow: var(--shadow-sm); font-weight: 600; }
    .tab-inactive { background: transparent; color: var(--text-muted); }
    .tab-inactive:hover { color: var(--text-secondary); }

    .month-active { background: var(--accent); color: white; }
    .month-inactive { background: var(--bg-subtle); color: var(--text-muted); }
    .month-inactive:hover { background: var(--bg-muted); color: var(--text-secondary); }
    .month-annual { background: linear-gradient(135deg, var(--accent) 0%, #7C7AE6 100%); color: white; font-weight: 600; }

    input[type="number"], input[type="text"], select {
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 10px;
      transition: all 0.2s ease;
    }
    input[type="number"]:focus, input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      outline: none;
      background: var(--bg-card);
      box-shadow: 0 0 0 3px rgba(88, 86, 214, 0.15);
    }
    input::placeholder { color: var(--text-subtle); }
    input[type="number"]::-webkit-inner-spin-button { opacity: 0.3; }

    .progress-bar { background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%); }
    .progress-bar-positive { background: linear-gradient(90deg, var(--positive-dark) 0%, var(--positive) 100%); }

    .btn {
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }
    .btn-secondary { background: var(--bg-subtle); color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-muted); color: var(--text-primary); }

    .chart-bar { border-radius: 4px 4px 0 0; transition: height 0.3s ease; }

    .tax-table { font-size: 12px; width: 100%; border-collapse: collapse; }
    .tax-table th, .tax-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    .tax-table th { color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
    .tax-table td { color: var(--text-secondary); }
    .tax-table tr.active { background: rgba(88, 86, 214, 0.08); }
    .tax-table tr.active td { color: var(--accent); font-weight: 600; }

    .donut-chart { position: relative; }
    .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // === SUPABASE INIT ===
    const SUPABASE_URL = 'https://cjcvtkcqbaubyqlijssj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqY3Z0a2NxYmF1YnlxbGlqc3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTg3NDMsImV4cCI6MjA4NzY5NDc0M30.kBZifO9Unx6kLvQ9Lqb-VKA3LDVQ-V9ROd-tLj2L-Jk';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Cloud sync functions
    async function loadFromSupabase(userId) {
      const { data, error } = await sb.from('bookkeeper_data').select('data').eq('user_id', userId).single();
      if (error && error.code !== 'PGRST116') throw error; // PGRST116 = no rows
      return data ? data.data : null;
    }

    // Count how many months have real data (income streams with entries)
    function countMonthsWithData(appData) {
      if (!appData || !appData.years) return 0;
      let count = 0;
      Object.values(appData.years).forEach(yearData => {
        Object.values(yearData || {}).forEach(monthData => {
          if (monthData && monthData.incomeStreams && monthData.incomeStreams.length > 0) count++;
        });
      });
      return count;
    }

    // Backup before every save — keeps last 20 snapshots
    async function backupBeforeSave(userId) {
      try {
        const current = await loadFromSupabase(userId);
        if (!current) return; // nothing to back up
        // Only back up if there's real data
        if (countMonthsWithData(current) === 0) return;
        await sb.from('bookkeeper_backups').insert({
          user_id: userId,
          data: current,
          created_at: new Date().toISOString(),
          reason: 'auto_backup_before_save'
        });
        // Clean old backups — keep last 20
        const { data: backups } = await sb.from('bookkeeper_backups')
          .select('id')
          .eq('user_id', userId)
          .order('created_at', { ascending: false });
        if (backups && backups.length > 20) {
          const toDelete = backups.slice(20).map(b => b.id);
          await sb.from('bookkeeper_backups').delete().in('id', toDelete);
        }
      } catch (e) {
        console.warn('Backup failed (non-fatal):', e);
        // Backup failure should never block the save
      }
    }

    // Recovery function — call from browser console: recoverBackup()
    window.recoverBackup = async function(backupIndex = 0) {
      try {
        const { data: session } = await sb.auth.getSession();
        if (!session?.session?.user) { console.error('Not signed in'); return; }
        const userId = session.session.user.id;
        const { data: backups } = await sb.from('bookkeeper_backups')
          .select('*')
          .eq('user_id', userId)
          .order('created_at', { ascending: false })
          .limit(10);
        if (!backups || backups.length === 0) { console.log('No backups found'); return; }
        if (backupIndex >= backups.length) { console.log('Invalid index. Available: 0-' + (backups.length-1)); return; }
        console.log('Available backups:');
        backups.forEach((b, i) => console.log(i + ': ' + b.created_at + ' (' + countMonthsWithData(b.data) + ' months with data)'));
        if (arguments.length > 0) {
          const backup = backups[backupIndex];
          console.log('Restoring backup from ' + backup.created_at + '...');
          await sb.from('bookkeeper_data').upsert(
            { user_id: userId, data: backup.data, updated_at: new Date().toISOString() },
            { onConflict: 'user_id' }
          );
          localStorage.setItem(STORAGE_KEY, JSON.stringify(backup.data));
          console.log('Restored! Refresh the page.');
        }
      } catch (e) { console.error('Recovery failed:', e); }
    };

    async function saveToSupabase(userId, appData) {
      // PROTECTION: Never overwrite real data with empty data
      const newDataCount = countMonthsWithData(appData);
      try {
        const existing = await loadFromSupabase(userId);
        const existingCount = countMonthsWithData(existing);
        if (existingCount > 0 && newDataCount === 0) {
          console.warn('BLOCKED: Refusing to overwrite ' + existingCount + ' months of data with empty data.');
          return;
        }
        // Back up before overwriting
        await backupBeforeSave(userId);
      } catch (e) {
        console.warn('Pre-save check failed (non-fatal):', e);
      }
      const { error } = await sb.from('bookkeeper_data').upsert(
        { user_id: userId, data: appData, updated_at: new Date().toISOString() },
        { onConflict: 'user_id' }
      );
      if (error) throw error;
    }

    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const STORAGE_KEY = 'erik_finance_tracker_data';

    const TAX_BRACKETS = [
      { min: 0, max: 23200, rate: 0.10 },
      { min: 23200, max: 94300, rate: 0.12 },
      { min: 94300, max: 201050, rate: 0.22 },
      { min: 201050, max: 383900, rate: 0.24 },
      { min: 383900, max: 487450, rate: 0.32 },
      { min: 487450, max: 731200, rate: 0.35 },
      { min: 731200, max: Infinity, rate: 0.37 }
    ];

    const STANDARD_DEDUCTION_MFJ = 29200;
    const SE_TAX_RATE = 0.1413;

    const CARD_COLORS = ['#5856D6', '#E57373', '#5AC8C8', '#F59E0B'];

    const createDefaultMonth = () => ({
      // Per-month income (starts empty - user adds their own streams)
      incomeStreams: [],
      monthlyBills: 0,
      actualDebtPayment: 0,
      // Per-month TTH transactions
      // tthAvailableFunds defaults to 1000, but housingBack and tthCheckTo
      // are calculated dynamically from annualHousingAllowance
      tthAvailableFunds: 1000   // Available funds inside Take the Hill
      // housingBack and tthCheckTo are NOT stored here - they default to calculated values
    });
    const createDefaultYear = () => {
      const months = {};
      MONTHS.forEach(m => { months[m] = createDefaultMonth(); });
      return months;
    };

    const createDefaultDebtCards = () => ([
      { id: 1, name: 'Chase (...1343)', startingBalance: 0 },
      { id: 2, name: 'Credit Card 2', startingBalance: 0 },
      { id: 3, name: 'Credit Card 3', startingBalance: 0 },
      { id: 4, name: 'Credit Card 4', startingBalance: 0 }
    ]);

    const createDefaultCardData = () => ({});

    const createDefaultSettings = () => ({
      // Take the Hill specific (global - for tax calculations)
      annualHousingAllowance: 40000,
      // Investment settings (global)
      erikIRA: 583,
      betsyIRA: 0,
      bitcoin: 146,
      rothMax: 7000,
      betsyIRAMax: 7000
    });

    const formatCurrency = (amount) => {
      const num = parseFloat(amount) || 0;
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(num);
    };

    const formatCurrencyDecimal = (amount) => {
      const num = parseFloat(amount) || 0;
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
    };

    const calculateIncomeTax = (taxableIncome) => {
      if (taxableIncome <= 0) return 0;
      let tax = 0;
      let remaining = taxableIncome;
      for (const bracket of TAX_BRACKETS) {
        if (remaining <= 0) break;
        const bracketWidth = bracket.max - bracket.min;
        const taxableInBracket = Math.min(remaining, bracketWidth);
        tax += taxableInBracket * bracket.rate;
        remaining -= taxableInBracket;
      }
      return tax;
    };

    const getCurrentBracket = (taxableIncome) => {
      for (const bracket of TAX_BRACKETS) {
        if (taxableIncome <= bracket.max) return bracket.rate;
      }
      return 0.37;
    };

    const calculateTaxes = (monthlyGross, annualHousingAllowance, monthlyW2 = 0, monthly1099 = 0) => {
      // Annual figures
      const annualGross = monthlyGross * 12;
      const annualW2 = monthlyW2 * 12;
      const annual1099 = monthly1099 * 12;

      // SE Tax - ministers pay on ALL ministerial income (W-2 + 1099)
      const annualSETax = annualGross * SE_TAX_RATE;
      const monthlySETax = annualSETax / 12;
      const monthlySETaxW2 = (annualW2 * SE_TAX_RATE) / 12;
      const monthlySETax1099 = (annual1099 * SE_TAX_RATE) / 12;

      // 50% SE Tax deduction (above-the-line)
      const seDeduction = annualSETax / 2;

      // Taxable income: Gross - Housing Allowance - 50% SE - Standard Deduction
      // Housing allowance offsets W-2 income for income tax purposes
      const taxableIncome = Math.max(0, annualGross - annualHousingAllowance - STANDARD_DEDUCTION_MFJ - seDeduction);
      const annualIncomeTax = calculateIncomeTax(taxableIncome);
      const monthlyIncomeTax = annualIncomeTax / 12;

      // Totals
      const totalMonthlyTax = monthlySETax + monthlyIncomeTax;
      const effectiveRate = monthlyGross > 0 ? totalMonthlyTax / monthlyGross : 0;
      const currentBracket = getCurrentBracket(taxableIncome);
      const quarterlyPayment = totalMonthlyTax * 3;

      // Housing allowance savings (what you'd owe in income tax without it)
      const taxableWithoutHousing = Math.max(0, annualGross - STANDARD_DEDUCTION_MFJ - seDeduction);
      const taxWithoutHousing = calculateIncomeTax(taxableWithoutHousing);
      const housingAllowanceSavings = taxWithoutHousing - annualIncomeTax;

      return {
        // Monthly figures
        monthlySETax,
        monthlySETaxW2,
        monthlySETax1099,
        monthlyIncomeTax,
        totalMonthlyTax,
        quarterlyPayment,
        effectiveRate,
        currentBracket,
        // Annual figures
        annualGross,
        annualW2,
        annual1099,
        annualSETax,
        seDeduction,
        taxableIncome,
        annualIncomeTax,
        housingAllowanceSavings
      };
    };

    // Donut Chart Component
    function DonutChart({ data, size = 200, strokeWidth = 40 }) {
      const total = data.reduce((sum, d) => sum + d.value, 0);
      if (total === 0) return <div style={{ width: size, height: size, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)' }}>No data</div>;

      const radius = (size - strokeWidth) / 2;
      const circumference = 2 * Math.PI * radius;
      let offset = 0;

      return (
        <div className="donut-chart" style={{ width: size, height: size }}>
          <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
            {data.map((d, i) => {
              const percentage = d.value / total;
              const strokeDasharray = `${percentage * circumference} ${circumference}`;
              const strokeDashoffset = -offset;
              offset += percentage * circumference;
              return (
                <circle
                  key={i}
                  cx={size / 2}
                  cy={size / 2}
                  r={radius}
                  fill="none"
                  stroke={d.color}
                  strokeWidth={strokeWidth}
                  strokeDasharray={strokeDasharray}
                  strokeDashoffset={strokeDashoffset}
                  transform={`rotate(-90 ${size / 2} ${size / 2})`}
                />
              );
            })}
          </svg>
          <div className="donut-center">
            <div style={{ fontSize: '20px', fontWeight: '700', color: 'var(--text-primary)' }}>{formatCurrency(total)}</div>
            <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Total</div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState(0);
      const [currentYear, setCurrentYear] = useState(2026);
      const [currentMonth, setCurrentMonth] = useState('January');
      const [isAnnualView, setIsAnnualView] = useState(false);
      const [years, setYears] = useState({ 2026: createDefaultYear() });
      const [debtCards, setDebtCards] = useState(createDefaultDebtCards());
      const [cardData, setCardData] = useState(createDefaultCardData());
      const [settings, setSettings] = useState(createDefaultSettings());
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState(''); // '', 'syncing', 'synced', 'error'

      // Auth listener
      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setAuthLoading(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });
        return () => subscription.unsubscribe();
      }, []);

      // Load data: localStorage first, then merge cloud data if signed in
      useEffect(() => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const data = JSON.parse(saved);
            // Migration: Clear old hardcoded housingBack and tthCheckTo values
            // so they recalculate based on annualHousingAllowance
            if (data.years) {
              Object.keys(data.years).forEach(year => {
                Object.keys(data.years[year] || {}).forEach(month => {
                  if (data.years[year][month]) {
                    delete data.years[year][month].housingBack;
                    delete data.years[year][month].tthCheckTo;
                  }
                });
              });
              setYears(data.years);
            }
            if (data.debtCards) setDebtCards(data.debtCards);
            if (data.cardData) setCardData(data.cardData);
            if (data.currentYear) setCurrentYear(data.currentYear);
            if (data.currentMonth) setCurrentMonth(data.currentMonth);
            if (data.settings) setSettings({ ...createDefaultSettings(), ...data.settings });
          } catch (e) { console.error('Failed to load data:', e); }
        }
      }, []);

      // Cloud sync: load from Supabase when user signs in
      useEffect(() => {
        if (!user) return;
        (async () => {
          try {
            setSyncStatus('syncing');
            const cloudData = await loadFromSupabase(user.id);
            if (cloudData) {
              // Merge: cloud data takes priority
              if (cloudData.years) {
                Object.keys(cloudData.years).forEach(year => {
                  Object.keys(cloudData.years[year] || {}).forEach(month => {
                    if (cloudData.years[year][month]) {
                      delete cloudData.years[year][month].housingBack;
                      delete cloudData.years[year][month].tthCheckTo;
                    }
                  });
                });
                setYears(cloudData.years);
              }
              if (cloudData.debtCards) setDebtCards(cloudData.debtCards);
              if (cloudData.cardData) setCardData(cloudData.cardData);
              if (cloudData.settings) setSettings({ ...createDefaultSettings(), ...cloudData.settings });
            } else {
              // No cloud data yet — push local data up
              const localSaved = localStorage.getItem(STORAGE_KEY);
              if (localSaved) {
                const localData = JSON.parse(localSaved);
                await saveToSupabase(user.id, localData);
              }
            }
            cloudSyncDone.current = true;
            setSyncStatus('synced');
          } catch (e) {
            console.error('Cloud sync failed:', e);
            cloudSyncDone.current = true; // Allow saves even if cloud sync fails
            setSyncStatus('error');
          }
        })();
      }, [user]);

      // Save data: always to localStorage, and to cloud if signed in
      const saveRef = React.useRef(false);
      const cloudSyncDone = React.useRef(false);
      useEffect(() => {
        const data = { years, debtCards, cardData, currentYear, currentMonth, settings };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

        // Sync to cloud (debounced, skip initial render, wait for cloud sync)
        if (!saveRef.current) { saveRef.current = true; return; }
        if (!user) return;
        if (!cloudSyncDone.current) { console.log('Save skipped — waiting for cloud sync to finish'); return; }

        const timer = setTimeout(async () => {
          try {
            setSyncStatus('syncing');
            await saveToSupabase(user.id, { years, debtCards, cardData, settings });
            setSyncStatus('synced');
          } catch (e) {
            console.error('Cloud save failed:', e);
            setSyncStatus('error');
          }
        }, 2000); // 2-second debounce

        return () => clearTimeout(timer);
      }, [years, debtCards, cardData, currentYear, currentMonth, settings, user]);

      // Merge loaded month data with defaults so new fields get populated
      const monthData = { ...createDefaultMonth(), ...(years[currentYear]?.[currentMonth] || {}) };

      const updateMonthData = (field, value) => {
        // Handle arrays (like incomeStreams) without parseFloat
        const processedValue = Array.isArray(value) ? value : (parseFloat(value) || 0);
        setYears(prev => ({
          ...prev,
          [currentYear]: { ...prev[currentYear], [currentMonth]: { ...prev[currentYear]?.[currentMonth], [field]: processedValue } }
        }));
      };

      const updateSettings = (field, value) => {
        // Handle arrays (like incomeStreams) without parseFloat
        if (Array.isArray(value)) {
          setSettings(prev => ({ ...prev, [field]: value }));
        } else {
          setSettings(prev => ({ ...prev, [field]: parseFloat(value) || 0 }));
        }

        // When Annual Housing Allowance changes, clear housingBack and tthCheckTo
        // from ALL months so they recalculate based on new value
        if (field === 'annualHousingAllowance') {
          setYears(prev => {
            const updated = { ...prev };
            Object.keys(updated).forEach(year => {
              Object.keys(updated[year] || {}).forEach(month => {
                if (updated[year][month]) {
                  const { housingBack, tthCheckTo, ...rest } = updated[year][month];
                  updated[year][month] = rest;
                }
              });
            });
            return updated;
          });
        }
      };

      const handleSignIn = () => {
        sb.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + window.location.pathname }
        });
      };

      const handleSignOut = async () => {
        await sb.auth.signOut();
        setSyncStatus('');
      };

      const addYear = () => {
        const newYear = Math.max(...Object.keys(years).map(Number)) + 1;
        setYears(prev => ({ ...prev, [newYear]: createDefaultYear() }));
        setCurrentYear(newYear);
      };

      const selectMonth = (month) => {
        setCurrentMonth(month);
        setIsAnnualView(false);
      };

      const selectAnnual = () => {
        setIsAnnualView(true);
      };

      const exportJSON = () => {
        const data = { years, debtCards, cardData, settings, exportDate: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = `finance_tracker_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
      };

      const importJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.years) setYears(data.years);
            if (data.debtCards) setDebtCards(data.debtCards);
            if (data.cardData) setCardData(data.cardData);
            if (data.settings) setSettings({ ...createDefaultSettings(), ...data.settings });
            alert('Data imported successfully!');
          } catch (e) { alert('Failed to import data: ' + e.message); }
        };
        reader.readAsText(file);
      };

      // Calculate income from streams (per-month data) - needed first for TTH calculations
      const incomeStreams = monthData.incomeStreams || [];
      const w2Income = incomeStreams.filter(s => s.type === 'w2').reduce((sum, s) => sum + (s.amount || 0), 0);
      const income1099 = incomeStreams.filter(s => s.type === '1099').reduce((sum, s) => sum + (s.amount || 0), 0);
      const gross = w2Income + income1099;

      // Per-month TTH transactions - use ?? to allow 0 as valid value
      const tthAvailableFunds = monthData.tthAvailableFunds ?? 1000;  // Available funds inside TTH
      const tithe = gross * 0.1;
      const additionalTithe = Math.max(0, tithe - tthAvailableFunds);  // Uses available funds

      // Housing back and check to TTH default to calculated values from annual housing allowance
      const defaultHousingBack = Math.round(settings.annualHousingAllowance / 12);
      const housingBack = monthData.housingBack ?? defaultHousingBack;
      const defaultCheckToTTH = Math.round(housingBack + additionalTithe);
      const tthCheckTo = monthData.tthCheckTo ?? defaultCheckToTTH;
      const donationToTTH = tthCheckTo;  // Actual check written to TTH
      const netCash = gross - additionalTithe;
      const taxInfo = calculateTaxes(gross, settings.annualHousingAllowance, w2Income, income1099);
      const taxSetAside = taxInfo.totalMonthlyTax;
      const erikIRA = settings.erikIRA;
      const betsyIRA = settings.betsyIRA || 0;
      const bitcoin = settings.bitcoin || 146;
      const bills = monthData.monthlyBills || 0;
      const availableForDebt = netCash - taxSetAside - erikIRA - betsyIRA - bitcoin - bills;
      const actualDebtPayment = monthData.actualDebtPayment || 0;
      const discretionary = availableForDebt - actualDebtPayment;

      // Calculate annual totals (sum across all months for per-month data)
      const getAnnualTotals = () => {
        const yearData = years[currentYear] || {};

        let totals = {
          gross: 0,
          tithe: 0,
          additionalTithe: 0,
          donation: 0,
          housingBack: 0,
          netCash: 0,
          tax: 0,
          erikIRA: settings.erikIRA * 12,
          betsyIRA: (settings.betsyIRA || 0) * 12,
          bitcoin: (settings.bitcoin || 146) * 12,
          bills: 0,
          debtPayment: 0,
          discretionary: 0
        };

        // Sum per-month data across all months
        MONTHS.forEach(month => {
          const m = { ...createDefaultMonth(), ...(yearData[month] || {}) };
          const mStreams = m.incomeStreams || [];
          const mGross = mStreams.reduce((sum, s) => sum + (s.amount || 0), 0);
          const mTithe = mGross * 0.1;
          const mTthAvailable = m.tthAvailableFunds ?? 1000;  // Use ?? to allow 0 as valid value
          const mAddT = Math.max(0, mTithe - mTthAvailable);  // Uses available funds
          // Calculate defaults for housing back and check to TTH (rounded to whole dollars)
          const mDefaultHousingBack = Math.round(settings.annualHousingAllowance / 12);
          const mHousingBack = m.housingBack ?? mDefaultHousingBack;
          const mDefaultCheckTo = Math.round(mHousingBack + mAddT);
          const mTthCheckTo = m.tthCheckTo ?? mDefaultCheckTo;
          const mNet = mGross - mAddT;
          const mTaxInfo = calculateTaxes(mGross, settings.annualHousingAllowance,
            mStreams.filter(s => s.type === 'w2').reduce((sum, s) => sum + (s.amount || 0), 0),
            mStreams.filter(s => s.type === '1099').reduce((sum, s) => sum + (s.amount || 0), 0));

          totals.gross += mGross;
          totals.tithe += mTithe;
          totals.additionalTithe += mAddT;
          totals.donation += mTthCheckTo;
          totals.housingBack += mHousingBack;
          totals.netCash += mNet;
          totals.tax += mTaxInfo.totalMonthlyTax;
          totals.bills += m.monthlyBills || 0;
          totals.debtPayment += m.actualDebtPayment || 0;
        });

        totals.discretionary = totals.netCash - totals.tax - totals.erikIRA - totals.betsyIRA - totals.bitcoin - totals.bills - totals.debtPayment;
        return totals;
      };

      const getAnnualCardTotals = () => {
        let totals = { purchases: 0, fees: 0, payments: 0 };
        let byCard = {};

        debtCards.forEach(card => {
          byCard[card.id] = { purchases: 0, fees: 0, payments: 0, name: card.name };
        });

        MONTHS.forEach(month => {
          const key = `${currentYear}-${month}`;
          debtCards.forEach(card => {
            const data = cardData[key]?.[card.id] || {};
            totals.purchases += data.purchases || 0;
            totals.fees += data.fees || 0;
            totals.payments += data.payments || 0;
            byCard[card.id].purchases += data.purchases || 0;
            byCard[card.id].fees += data.fees || 0;
            byCard[card.id].payments += data.payments || 0;
          });
        });

        return { totals, byCard };
      };

      const tabs = ['TTH Calculator', 'Money at Home', 'Credit Cards', 'Taxes', 'Settings'];

      // LOGIN WALL — nothing renders until authenticated
      if (authLoading) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#1a1a2e' }}>
            <p style={{ color: '#C89B3C', fontSize: '18px', fontFamily: 'Poppins, sans-serif' }}>Loading...</p>
          </div>
        );
      }

      if (!user) {
        return (
          <div style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            height: '100vh', background: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%)',
            fontFamily: 'Poppins, sans-serif'
          }}>
            <img src="logo.png" alt="Erik Bledsoe" style={{ width: '320px', marginBottom: '40px', opacity: 0.95 }} />
            <h1 style={{ fontSize: '28px', fontWeight: '600', color: '#ffffff', margin: '0 0 8px 0', letterSpacing: '0.5px' }}>Monthly Bookkeeper</h1>
            <p style={{ fontSize: '15px', color: '#8892a4', margin: '0 0 40px 0' }}>Sign in to access your financial data</p>
            <button onClick={handleSignIn} style={{
              background: '#C89B3C', color: '#1a1a2e', border: 'none', borderRadius: '8px',
              padding: '14px 36px', fontSize: '16px', fontWeight: '600', cursor: 'pointer',
              fontFamily: 'Poppins, sans-serif', letterSpacing: '0.3px',
              boxShadow: '0 4px 20px rgba(200, 155, 60, 0.3)',
              transition: 'transform 0.15s ease, box-shadow 0.15s ease'
            }}
            onMouseOver={(e) => { e.target.style.transform = 'translateY(-2px)'; e.target.style.boxShadow = '0 6px 28px rgba(200, 155, 60, 0.45)'; }}
            onMouseOut={(e) => { e.target.style.transform = 'translateY(0)'; e.target.style.boxShadow = '0 4px 20px rgba(200, 155, 60, 0.3)'; }}
            >Sign in with Google</button>
          </div>
        );
      }

      return (
        <div style={{ maxWidth: '1100px', margin: '0 auto', padding: '32px 24px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '32px' }}>
            <div>
              <h1 style={{ fontSize: '28px', fontWeight: '600', color: 'var(--text-primary)', margin: '0 0 4px 0' }}>Monthly Bookkeeper</h1>
              <p style={{ fontSize: '14px', color: 'var(--text-muted)', margin: 0 }}>Monthly finances, TTH routing, and debt payoff</p>
            </div>
            {/* Auth controls */}
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              {syncStatus === 'synced' && <span style={{ color: 'var(--positive-dark)', fontSize: '12px' }}>{'\u2601\uFE0F'} Synced</span>}
              {syncStatus === 'syncing' && <span style={{ color: 'var(--text-muted)', fontSize: '12px' }}>Syncing...</span>}
              {syncStatus === 'error' && <span style={{ color: 'var(--negative)', fontSize: '12px' }}>Sync error</span>}
              <button onClick={handleSignOut} className="btn btn-secondary" style={{ fontSize: '12px', padding: '6px 12px' }}>
                Sign Out
              </button>
            </div>
          </div>

          {/* Year and Month Navigation */}
          <div className="card" style={{ padding: '20px', marginBottom: '24px' }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
              <select value={currentYear} onChange={(e) => setCurrentYear(parseInt(e.target.value))} style={{ padding: '10px 14px', fontSize: '14px', fontWeight: '500' }}>
                {Object.keys(years).sort().map(y => <option key={y} value={y}>{y}</option>)}
              </select>
              <button onClick={addYear} className="btn btn-secondary">+ Year</button>
            </div>

            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
              {MONTHS.map(m => (
                <button
                  key={m}
                  onClick={() => selectMonth(m)}
                  className={!isAnnualView && currentMonth === m ? 'month-active' : 'month-inactive'}
                  style={{ padding: '8px 14px', borderRadius: '8px', fontSize: '13px', fontWeight: '500', border: 'none', cursor: 'pointer', transition: 'all 0.2s' }}
                >
                  {m.slice(0, 3)}
                </button>
              ))}
              <button
                onClick={selectAnnual}
                className={isAnnualView ? 'month-annual' : 'month-inactive'}
                style={{ padding: '8px 16px', borderRadius: '8px', fontSize: '13px', fontWeight: '600', border: 'none', cursor: 'pointer', transition: 'all 0.2s' }}
              >
                {'\u{1F4CA}'} Annual
              </button>
            </div>
          </div>

          {/* Tabs */}
          <div className="tab-bar" style={{ display: 'flex', gap: '4px', marginBottom: '24px' }}>
            {tabs.map((tab, i) => (
              <button
                key={tab}
                onClick={() => setActiveTab(i)}
                className={activeTab === i ? 'tab-active' : 'tab-inactive'}
                style={{ flex: 1, padding: '12px 16px', borderRadius: '8px', fontSize: '14px', fontWeight: '500', border: 'none', cursor: 'pointer', transition: 'all 0.2s' }}
              >
                {tab}
              </button>
            ))}
          </div>

          {/* Tab Content */}
          {isAnnualView ? (
            <AnnualSummary
              activeTab={activeTab}
              currentYear={currentYear}
              annualTotals={getAnnualTotals()}
              annualCardTotals={getAnnualCardTotals()}
              settings={settings}
              debtCards={debtCards}
              cardData={cardData}
              years={years}
            />
          ) : (
            <>
              {activeTab === 0 && (
                <TTHCalculator gross={gross} tithe={tithe} tthAvailableFunds={tthAvailableFunds} tthCheckTo={tthCheckTo} additionalTithe={additionalTithe} donationToTTH={donationToTTH} housingBack={housingBack} netCash={netCash} annualHousingAllowance={settings.annualHousingAllowance} />
              )}
              {activeTab === 1 && (
                <MoneyAtHome gross={gross} netCash={netCash} taxInfo={taxInfo} erikIRA={erikIRA} betsyIRA={betsyIRA} bitcoin={bitcoin} bills={bills} availableForDebt={availableForDebt} actualDebtPayment={actualDebtPayment} discretionary={discretionary} updateMonthData={updateMonthData} monthData={monthData} rothMax={settings.rothMax} betsyIRAMax={settings.betsyIRAMax} />
              )}
              {activeTab === 2 && (
                <CreditCardTracker debtCards={debtCards} setDebtCards={setDebtCards} cardData={cardData} setCardData={setCardData} currentYear={currentYear} currentMonth={currentMonth} years={years} />
              )}
              {activeTab === 3 && (
                <TaxesTab taxInfo={taxInfo} gross={gross} w2Income={w2Income} income1099={income1099} incomeStreams={incomeStreams} settings={settings} />
              )}
              {activeTab === 4 && (
                <SettingsTab settings={settings} updateSettings={updateSettings} monthData={monthData} updateMonthData={updateMonthData} currentMonth={currentMonth} taxInfo={taxInfo} gross={gross} />
              )}
            </>
          )}

          {/* Export/Import */}
          <div className="card" style={{ padding: '20px', marginTop: '24px' }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
              <button onClick={exportJSON} className="btn btn-secondary">Export Backup</button>
              <label className="btn btn-secondary" style={{ cursor: 'pointer' }}>
                Import Backup
                <input type="file" accept=".json" onChange={importJSON} style={{ display: 'none' }} />
              </label>
            </div>
            <p style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '12px' }}>Data auto-saves to browser. Export backup for safekeeping.</p>
          </div>
        </div>
      );
    }

    function AnnualSummary({ activeTab, currentYear, annualTotals, annualCardTotals, settings, debtCards, cardData, years }) {
      const t = annualTotals;
      const c = annualCardTotals;

      // Build monthly trend data for cards
      const getMonthlyCardData = () => {
        return MONTHS.map(month => {
          const key = `${currentYear}-${month}`;
          let monthFees = 0;
          let monthPurchases = 0;
          const byCard = {};

          debtCards.forEach((card, i) => {
            const data = cardData[key]?.[card.id] || {};
            byCard[card.id] = { fees: data.fees || 0, purchases: data.purchases || 0 };
            monthFees += data.fees || 0;
            monthPurchases += data.purchases || 0;
          });

          return { month: month.slice(0, 3), totalFees: monthFees, totalPurchases: monthPurchases, byCard };
        });
      };

      const monthlyCardData = getMonthlyCardData();
      const maxFees = Math.max(...monthlyCardData.map(m => m.totalFees), 1);

      // Monthly income trend
      const getMonthlyIncome = () => {
        return MONTHS.map(month => {
          const m = { ...createDefaultMonth(), ...(years[currentYear]?.[month] || {}) };
          const streams = m.incomeStreams || [];
          const gross = streams.reduce((sum, s) => sum + (s.amount || 0), 0);
          return { month: month.slice(0, 3), gross };
        });
      };

      const monthlyIncome = getMonthlyIncome();
      const maxIncome = Math.max(...monthlyIncome.map(m => m.gross), 1);

      if (activeTab === 0) {
        // TTH Annual Summary
        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
            <div className="card" style={{ padding: '24px' }}>
              <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{currentYear} TTH Summary</label>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '16px', marginTop: '16px' }}>
                <Stat label="Total Gross" value={formatCurrency(t.gross)} />
                <Stat label="Total Tithe" value={formatCurrency(t.tithe)} />
                <Stat label="Total Donation to TTH" value={formatCurrency(t.donation)} />
                <Stat label="Total Housing (back)" value={formatCurrency(t.housingBack)} />
                <Stat label="Total Net Cash" value={formatCurrency(t.netCash)} />
              </div>
            </div>

            <div className="card" style={{ padding: '24px' }}>
              <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Monthly Gross Income Trend</label>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: '8px', height: '150px', marginTop: '16px' }}>
                {monthlyIncome.map((m, i) => (
                  <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                    <span style={{ fontSize: '9px', color: 'var(--accent)', fontWeight: '600' }}>{m.gross > 0 ? formatCurrency(m.gross) : ''}</span>
                    <div className="chart-bar" style={{ width: '100%', height: `${(m.gross / maxIncome) * 100}px`, minHeight: m.gross > 0 ? '4px' : '0', background: 'var(--accent)' }} />
                    <span style={{ fontSize: '10px', color: 'var(--text-muted)' }}>{m.month}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (activeTab === 1) {
        // Money at Home Annual Summary
        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
            <div className="card" style={{ padding: '24px' }}>
              <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{currentYear} Money at Home Summary</label>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '16px', marginTop: '16px' }}>
                <Stat label="Total Net Cash" value={formatCurrency(t.netCash)} />
                <Stat label="Total Tax Set-Aside" value={formatCurrency(t.tax)} />
                <Stat label="Total Erik IRA" value={formatCurrency(t.erikIRA)} />
                <Stat label="Total Betsy IRA" value={formatCurrency(t.betsyIRA)} />
                <Stat label="Total Bitcoin" value={formatCurrency(t.bitcoin)} />
                <Stat label="Total Bills" value={formatCurrency(t.bills)} />
                <Stat label="Total Debt Payments" value={formatCurrency(t.debtPayment)} />
                <Stat label="Total Discretionary" value={formatCurrency(t.discretionary)} negative={t.discretionary < 0} />
              </div>
            </div>
          </div>
        );
      }

      if (activeTab === 2) {
        // Credit Cards Annual Summary
        const donutData = [
          { label: 'Spending', value: c.totals.purchases, color: 'var(--accent)' },
          { label: 'Fees', value: c.totals.fees, color: 'var(--negative)' }
        ];

        const feesByCard = debtCards.map((card, i) => ({
          label: card.name,
          value: c.byCard[card.id]?.fees || 0,
          color: CARD_COLORS[i]
        }));

        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
            <div className="card" style={{ padding: '24px' }}>
              <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{currentYear} Credit Card Summary</label>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '16px', marginTop: '16px' }}>
                <Stat label="Total Spending" value={formatCurrency(c.totals.purchases)} />
                <Stat label="Total Fees Paid" value={formatCurrencyDecimal(c.totals.fees)} negative />
                <Stat label="Total Payments" value={formatCurrency(c.totals.payments)} />
                <Stat label="Net (Payments - Purchases)" value={formatCurrency(c.totals.payments - c.totals.purchases)} negative={c.totals.payments < c.totals.purchases} />
              </div>
            </div>

            {/* Donut: Spending vs Fees */}
            <div className="card" style={{ padding: '24px' }}>
              <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Spending vs Fees</label>
              <div style={{ display: 'flex', alignItems: 'center', gap: '40px', marginTop: '20px', flexWrap: 'wrap' }}>
                <DonutChart data={donutData} size={180} strokeWidth={35} />
                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                  {donutData.map((d, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                      <div style={{ width: '16px', height: '16px', borderRadius: '4px', background: d.color }} />
                      <div>
                        <div style={{ fontSize: '13px', fontWeight: '600', color: 'var(--text-primary)' }}>{d.label}</div>
                        <div style={{ fontSize: '12px', color: 'var(--text-muted)' }}>{formatCurrency(d.value)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Fees by Card Donut */}
            <div className="card" style={{ padding: '24px' }}>
              <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Fees by Card</label>
              <div style={{ display: 'flex', alignItems: 'center', gap: '40px', marginTop: '20px', flexWrap: 'wrap' }}>
                <DonutChart data={feesByCard.filter(d => d.value > 0)} size={180} strokeWidth={35} />
                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                  {feesByCard.map((d, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                      <div style={{ width: '14px', height: '14px', borderRadius: '3px', background: d.color }} />
                      <div>
                        <div style={{ fontSize: '12px', fontWeight: '500', color: 'var(--text-primary)' }}>{d.label}</div>
                        <div style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{formatCurrencyDecimal(d.value)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Stacked Bar: Monthly Fees Trend */}
            <div className="card" style={{ padding: '24px' }}>
              <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Monthly Fees Trend</label>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: '6px', height: '160px', marginTop: '16px' }}>
                {monthlyCardData.map((m, mi) => (
                  <div key={mi} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                    <div style={{ display: 'flex', flexDirection: 'column-reverse', width: '100%' }}>
                      {debtCards.map((card, ci) => {
                        const fees = m.byCard[card.id]?.fees || 0;
                        const height = maxFees > 0 ? (fees / maxFees) * 100 : 0;
                        return (
                          <div
                            key={ci}
                            style={{
                              width: '100%',
                              height: `${height}px`,
                              background: CARD_COLORS[ci],
                              borderRadius: ci === debtCards.length - 1 ? '4px 4px 0 0' : '0'
                            }}
                          />
                        );
                      })}
                    </div>
                    <span style={{ fontSize: '10px', color: 'var(--text-muted)', marginTop: '6px' }}>{m.month}</span>
                  </div>
                ))}
              </div>
              <div style={{ display: 'flex', gap: '16px', marginTop: '16px', flexWrap: 'wrap' }}>
                {debtCards.map((card, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                    <div style={{ width: '12px', height: '12px', borderRadius: '3px', background: CARD_COLORS[i] }} />
                    <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{card.name}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      if (activeTab === 3) {
        return (
          <div className="card" style={{ padding: '24px' }}>
            <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{currentYear} Tax Summary</label>
            <p style={{ color: 'var(--text-muted)', marginTop: '16px' }}>Tax calculations are based on your settings. View monthly for full breakdown.</p>
          </div>
        );
      }

      if (activeTab === 4) {
        return (
          <div className="card" style={{ padding: '24px' }}>
            <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{currentYear} Settings Summary</label>
            <p style={{ color: 'var(--text-muted)', marginTop: '16px' }}>Settings are the same for all months. Switch to a monthly view to adjust settings.</p>
          </div>
        );
      }

      return null;
    }

    function TTHCalculator({ gross, tithe, tthAvailableFunds, tthCheckTo, additionalTithe, donationToTTH, housingBack, netCash, annualHousingAllowance }) {
      return (

    function CreditCardTracker({ debtCards, setDebtCards, cardData, setCardData, currentYear, currentMonth, years }) {
      const dataKey = `${currentYear}-${currentMonth}`;

      const updateCard = (id, field, value) => {
        setDebtCards(prev => prev.map(c => c.id === id ? { ...c, [field]: field === 'name' ? value : (parseFloat(value) || 0) } : c));
      };

      const updateCardData = (cardId, field, value) => {
        setCardData(prev => ({
          ...prev,
          [dataKey]: {
            ...prev[dataKey],
            [cardId]: {
              ...prev[dataKey]?.[cardId],
              [field]: parseFloat(value) || 0
            }
          }
        }));
      };

      const getCardMonthData = (cardId) => cardData[dataKey]?.[cardId] || {};

      const getTotalFees = (cardId) => {
        let total = 0;
        Object.keys(cardData).forEach(key => {
          if (key.startsWith(`${currentYear}-`)) {
            total += cardData[key]?.[cardId]?.fees || 0;
          }
        });
        return total;
      };

      const getTotalPayments = (cardId) => {
        let total = 0;
        Object.keys(cardData).forEach(key => {
          if (key.startsWith(`${currentYear}-`)) {
            total += cardData[key]?.[cardId]?.payments || 0;
          }
        });
        return total;
      };

      const getTotalPurchases = (cardId) => {
        let total = 0;
        Object.keys(cardData).forEach(key => {
          if (key.startsWith(`${currentYear}-`)) {
            total += cardData[key]?.[cardId]?.purchases || 0;
          }
        });
        return total;
      };

      // Get fee history for a card
      const getFeeHistory = (cardId) => {
        return MONTHS.map(month => {
          const key = `${currentYear}-${month}`;
          return { month: month.slice(0, 3), fees: cardData[key]?.[cardId]?.fees || 0 };
        });
      };

      // Aggregate totals
      const totalFees = debtCards.reduce((sum, c) => sum + getTotalFees(c.id), 0);
      const totalPayments = debtCards.reduce((sum, c) => sum + getTotalPayments(c.id), 0);
      const totalPurchases = debtCards.reduce((sum, c) => sum + getTotalPurchases(c.id), 0);

      // Donut data: Spending vs Fees (YTD)
      const donutDataYTD = [
        { label: 'Spending', value: totalPurchases, color: 'var(--accent)' },
        { label: 'Fees', value: totalFees, color: 'var(--negative)' }
      ];

      const monthlySpending = debtCards.reduce((sum, c) => sum + (cardData[dataKey]?.[c.id]?.purchases || 0), 0);
      const monthlyFees = debtCards.reduce((sum, c) => sum + (cardData[dataKey]?.[c.id]?.fees || 0), 0);

      // Donut data: Spending vs Fees (Current Month)
      const donutDataMonthly = [
        { label: 'Spending', value: monthlySpending, color: 'var(--accent)' },
        { label: 'Fees', value: monthlyFees, color: 'var(--negative)' }
      ];

      // Stacked bar data
      const monthlyData = MONTHS.map(month => {
        const key = `${currentYear}-${month}`;
        const byCard = {};
        let totalMonthFees = 0;
        debtCards.forEach(card => {
          const fees = cardData[key]?.[card.id]?.fees || 0;
          byCard[card.id] = fees;
          totalMonthFees += fees;
        });
        return { month: month.slice(0, 3), byCard, total: totalMonthFees };
      });

      const maxMonthFees = Math.max(...monthlyData.map(m => m.total), 1);

                </div>
                <div style={{ textAlign: 'center' }}>
                  <p style={{ fontSize: '11px', color: 'var(--text-muted)', margin: 0 }}>Total Fees</p>

                    </div>

                    {/* Net Change & New Balance */}

                      const isIncrease = netChange > 0;
                      const isDecrease = netChange < 0;
                      return (
                        <div style={{ marginTop: '12px', paddingTop: '12px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
              <div style={{ background: 'var(--bg-subtle)', padding: '16px', borderRadius: '12px' }}>
                <p style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', marginBottom: '8px' }}>Monthly Tax Breakdown</p>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                  <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>SE Tax (14.1%)</span>
                  <span style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)' }}>{formatCurrency(taxInfo.monthlySETax)}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                  <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>Income Tax ({(taxInfo.currentBracket * 100).toFixed(0)}%)</span>
                  <span style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)' }}>{formatCurrency(taxInfo.monthlyIncomeTax)}</span>
                </div>
                <div style={{ borderTop: '1px solid var(--border)', paddingTop: '6px', marginTop: '6px', display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-primary)' }}>Total Set-Aside</span>
                  <span style={{ fontSize: '14px', fontWeight: '700', color: '#D97706' }}>{formatCurrency(taxInfo.totalMonthlyTax)}</span>
                </div>
              </div>

              <div style={{ background: 'var(--bg-subtle)', padding: '16px', borderRadius: '12px' }}>
                <p style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)', marginBottom: '8px' }}>2025 MFJ Tax Brackets</p>
                <table className="tax-table">
                  <thead><tr><th>Income</th><th>Rate</th></tr></thead>
                  <tbody>
                    {TAX_BRACKETS.map((bracket, i) => (
                      <tr key={i} className={taxInfo.taxableIncome > bracket.min && taxInfo.taxableIncome <= bracket.max ? 'active' : ''}>
                        <td>{bracket.max === Infinity ? `$${(bracket.min/1000).toFixed(0)}K+` : `$${(bracket.min/1000).toFixed(0)}K-${(bracket.max/1000).toFixed(0)}K`}</td>
                        <td>{(bracket.rate * 100).toFixed(0)}%</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SettingsTab({ settings, updateSettings, monthData, updateMonthData, currentMonth, taxInfo, gross }) {
      // Per-month data
      const incomeStreams = monthData.incomeStreams || [];
      const totalMonthlyGross = incomeStreams.reduce((sum, s) => sum + (s.amount || 0), 0);

      const updateMonthlyField = (field, value) => {
        // For arrays, don't use parseFloat
        if (Array.isArray(value)) {
          updateMonthData(field, value);
        } else {
          updateMonthData(field, parseFloat(value) || 0);
        }
      };

      const addIncomeStream = () => {
        const newId = Math.max(0, ...incomeStreams.map(s => s.id)) + 1;
        updateMonthlyField('incomeStreams', [...incomeStreams, { id: newId, title: 'New Income', type: '1099', amount: 0 }]);
      };

      const updateIncomeStream = (id, field, value) => {
        updateMonthlyField('incomeStreams', incomeStreams.map(s =>
          s.id === id ? { ...s, [field]: field === 'amount' ? parseFloat(value) || 0 : value } : s
        ));
      };

      const removeIncomeStream = (id) => {
        updateMonthlyField('incomeStreams', incomeStreams.filter(s => s.id !== id));
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
          {/* Income Streams - Per Month */}
          <div className="card" style={{ padding: '24px' }}>
            <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{currentMonth} Income</label>
            <p style={{ fontSize: '12px', color: 'var(--text-subtle)', marginTop: '4px', marginBottom: '20px' }}>Enter this month's income sources (W-2 or 1099)</p>

            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
              {incomeStreams.map((stream, i) => (
                <div key={stream.id} style={{ display: 'grid', gridTemplateColumns: '1fr 120px 140px 40px', gap: '12px', alignItems: 'center', padding: '12px', background: 'var(--bg-subtle)', borderRadius: '10px' }}>
                  <input
                    type="text"
                    value={stream.title}
                    onChange={(e) => updateIncomeStream(stream.id, 'title', e.target.value)}
                    placeholder="Income source name"
                    style={{ padding: '10px 12px', fontSize: '14px', fontWeight: '500' }}
                  />
                  <select
                    value={stream.type}
                    onChange={(e) => updateIncomeStream(stream.id, 'type', e.target.value)}
                    style={{ padding: '10px 12px', fontSize: '14px', background: stream.type === 'w2' ? 'rgba(88, 86, 214, 0.1)' : 'rgba(245, 158, 11, 0.1)', color: stream.type === 'w2' ? 'var(--accent)' : '#D97706', fontWeight: '600', border: 'none', borderRadius: '8px', cursor: 'pointer' }}
                  >
                    <option value="w2">W-2</option>
                    <option value="1099">1099</option>
                  </select>
                  <div style={{ position: 'relative' }}>
                    <span style={{ position: 'absolute', left: '12px', top: '50%', transform: 'translateY(-50%)', color: 'var(--text-muted)' }}>$</span>
                    <input
                      type="number"
                      value={stream.amount || ''}
                      onChange={(e) => updateIncomeStream(stream.id, 'amount', e.target.value)}
                      placeholder="0"
                      style={{ width: '100%', paddingLeft: '28px', paddingRight: '12px', paddingTop: '10px', paddingBottom: '10px', fontSize: '14px', fontWeight: '600' }}
                    />
                  </div>
                  <button
                    onClick={() => removeIncomeStream(stream.id)}
                    style={{ width: '36px', height: '36px', borderRadius: '8px', border: 'none', background: 'rgba(229, 115, 115, 0.1)', color: 'var(--negative)', cursor: 'pointer', fontSize: '18px' }}
                  >×</button>
                </div>
              ))}
            </div>

            <button
              onClick={addIncomeStream}
              style={{ marginTop: '12px', padding: '12px 20px', background: 'var(--bg-subtle)', border: '2px dashed var(--border)', borderRadius: '10px', color: 'var(--text-muted)', fontSize: '14px', fontWeight: '500', cursor: 'pointer', width: '100%' }}
            >+ Add Income Stream</button>

            <div style={{ marginTop: '20px', padding: '16px', background: 'linear-gradient(135deg, rgba(90, 200, 200, 0.08) 0%, rgba(59, 168, 168, 0.08) 100%)', borderRadius: '12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: '14px', fontWeight: '600', color: 'var(--text-secondary)' }}>Monthly Gross Earnings</span>
              <span style={{ fontSize: '24px', fontWeight: '700', color: 'var(--positive-dark)' }}>{formatCurrency(totalMonthlyGross)}</span>
            </div>
          </div>

          {/* Take the Hill - Consolidated */}
          {(() => {
            // Calculate TTH values - Housing Back defaults to Annual / 12
            // Use ?? (nullish coalescing) to allow 0 as a valid value
            const tithe = totalMonthlyGross * 0.1;
            const availableFunds = monthData.tthAvailableFunds ?? 1000;
            const defaultHousingBack = Math.round(settings.annualHousingAllowance / 12);
            const housingBack = monthData.housingBack ?? defaultHousingBack;
            const additionalTithe = Math.max(0, tithe - availableFunds);
            const calculatedCheckToTTH = Math.round(housingBack + additionalTithe);
            // Check to TTH defaults to calculated value (rounded to whole dollars)
            const checkToTTH = monthData.tthCheckTo ?? calculatedCheckToTTH;

            return (
              <div className="card" style={{ padding: '24px' }}>
                <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Take the Hill</label>
                <p style={{ fontSize: '12px', color: 'var(--text-subtle)', marginTop: '4px', marginBottom: '20px' }}>{currentMonth} transactions and annual tax settings</p>

                {/* Calculated Reference Row */}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px', marginBottom: '20px', padding: '16px', background: 'var(--bg-subtle)', borderRadius: '12px' }}>
                  <div style={{ textAlign: 'center' }}>
                    <p style={{ fontSize: '10px', color: 'var(--text-muted)', margin: 0 }}>Gross Income</p>
                    <p style={{ fontSize: '16px', fontWeight: '600', color: 'var(--text-primary)', margin: '4px 0 0 0' }}>{formatCurrency(totalMonthlyGross)}</p>
                  </div>
                  <div style={{ textAlign: 'center' }}>
                    <p style={{ fontSize: '10px', color: 'var(--text-muted)', margin: 0 }}>Tithe (10%)</p>
                    <p style={{ fontSize: '16px', fontWeight: '600', color: 'var(--text-primary)', margin: '4px 0 0 0' }}>{formatCurrency(tithe)}</p>
                  </div>
                  <div style={{ textAlign: 'center' }}>
                    <p style={{ fontSize: '10px', color: 'var(--text-muted)', margin: 0 }}>Additional Tithe</p>
                    <p style={{ fontSize: '16px', fontWeight: '600', color: additionalTithe > 0 ? '#D97706' : 'var(--positive-dark)', margin: '4px 0 0 0' }}>{formatCurrency(additionalTithe)}</p>
                  </div>
                </div>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '16px' }}>
                  <SettingInput label="Annual Housing Allowance" value={settings.annualHousingAllowance} onChange={(v) => updateSettings('annualHousingAllowance', v)} hint={`Monthly: ${formatCurrency(settings.annualHousingAllowance / 12)}`} />
                  <SettingInput label="Available Funds in TTH" value={availableFunds} onChange={(v) => updateMonthlyField('tthAvailableFunds', v)} hint="Funds available inside TTH this month" />
                  <SettingInput label="Check to TTH" value={checkToTTH} onChange={(v) => updateMonthlyField('tthCheckTo', v)} hint={`= ${formatCurrency(housingBack)} + ${formatCurrency(additionalTithe)}`} />
                  <SettingInput label="Housing Allowance Back" value={housingBack} onChange={(v) => updateMonthlyField('housingBack', v)} hint={`Annual ÷ 12 = ${formatCurrency(defaultHousingBack)}`} />
                </div>
              </div>
            );
          })()}

          {/* Monthly Expenses - Per Month */}
          <div className="card" style={{ padding: '24px' }}>
            <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{currentMonth} Expenses</label>
            <p style={{ fontSize: '12px', color: 'var(--text-subtle)', marginTop: '4px', marginBottom: '20px' }}>Enter this month's living expenses</p>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '16px' }}>
              <SettingInput label="Monthly Bills" value={monthData.monthlyBills || ''} onChange={(v) => updateMonthlyField('monthlyBills', v)} hint="Living expenses aggregate" />
            </div>
          </div>

          {/* Investment Contributions */}
          <div className="card" style={{ padding: '24px' }}>
            <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Monthly Investment Contributions</label>
            <p style={{ fontSize: '12px', color: 'var(--text-subtle)', marginTop: '4px', marginBottom: '20px' }}>Fixed amounts invested each month</p>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: '16px' }}>
              <SettingInput label="Erik's Roth IRA" value={settings.erikIRA} onChange={(v) => updateSettings('erikIRA', v)} hint={settings.rothMax === 7000 ? "Max: $7K/yr → $583/mo" : "Max: $8K/yr → $667/mo"} />
              <SettingInput label="Betsy's Traditional IRA" value={settings.betsyIRA} onChange={(v) => updateSettings('betsyIRA', v)} hint={settings.betsyIRAMax === 7000 ? "Max: $7K/yr → $583/mo" : "Max: $8K/yr → $667/mo"} />
              <SettingInput label="Bitcoin (Combined)" value={settings.bitcoin} onChange={(v) => updateSettings('bitcoin', v)} hint={`Suggested: $${Math.round((settings.rothMax / 4) / 12) + Math.round((settings.betsyIRAMax / 4) / 12)}/mo (20% of both portfolios)`} />
            </div>
          </div>

          {/* Erik's Investment Portfolio */}
          <div className="card" style={{ padding: '24px' }}>
            <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Erik's Investment Portfolio</label>
            <p style={{ fontSize: '12px', color: 'var(--text-subtle)', marginTop: '4px', marginBottom: '20px' }}>Roth IRA = 80% (4 segments) | Bitcoin = 20% (1 segment)</p>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
              <div>
                <label style={{ fontSize: '12px', fontWeight: '500', color: 'var(--text-muted)', marginBottom: '8px', display: 'block' }}>Roth IRA Annual Max</label>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button
                    onClick={() => updateSettings('rothMax', 7000)}
                    style={{
                      flex: 1,
                      padding: '14px',
                      borderRadius: '10px',
                      border: settings.rothMax === 7000 ? '2px solid var(--accent)' : '1px solid var(--border)',
                      background: settings.rothMax === 7000 ? 'rgba(88, 86, 214, 0.08)' : 'var(--bg-subtle)',
                      cursor: 'pointer',
                      transition: 'all 0.2s'
                    }}
                  >
                    <div style={{ fontSize: '18px', fontWeight: '700', color: settings.rothMax === 7000 ? 'var(--accent)' : 'var(--text-secondary)' }}>$7,000</div>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px' }}>Under 50</div>
                  </button>
                  <button
                    onClick={() => updateSettings('rothMax', 8000)}
                    style={{
                      flex: 1,
                      padding: '14px',
                      borderRadius: '10px',
                      border: settings.rothMax === 8000 ? '2px solid var(--accent)' : '1px solid var(--border)',
                      background: settings.rothMax === 8000 ? 'rgba(88, 86, 214, 0.08)' : 'var(--bg-subtle)',
                      cursor: 'pointer',
                      transition: 'all 0.2s'
                    }}
                  >
                    <div style={{ fontSize: '18px', fontWeight: '700', color: settings.rothMax === 8000 ? 'var(--accent)' : 'var(--text-secondary)' }}>$8,000</div>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px' }}>Age 50+</div>
                  </button>
                </div>
              </div>

              <div style={{ background: 'rgba(247, 147, 26, 0.08)', padding: '16px', borderRadius: '12px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' }}>
                  <span style={{ fontSize: '20px' }}>{'\u{20BF}'}</span>
                  <span style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)' }}>Erik's Bitcoin (20%)</span>
                </div>
                <div style={{ fontSize: '24px', fontWeight: '700', color: '#F7931A' }}>${Math.round((settings.rothMax / 4) / 12)}<span style={{ fontSize: '14px', color: 'var(--text-muted)' }}>/mo</span></div>
                <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '4px' }}>{formatCurrency(settings.rothMax / 4)}/year</div>
              </div>
            </div>
          </div>

          {/* Betsy's Investment Portfolio */}
          <div className="card" style={{ padding: '24px' }}>
            <label style={{ fontSize: '11px', fontWeight: '600', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Betsy's Investment Portfolio</label>
            <p style={{ fontSize: '12px', color: 'var(--text-subtle)', marginTop: '4px', marginBottom: '20px' }}>Traditional IRA (401k Rollover) = 80% | Bitcoin = 20%</p>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
              <div>
                <label style={{ fontSize: '12px', fontWeight: '500', color: 'var(--text-muted)', marginBottom: '8px', display: 'block' }}>Traditional IRA Annual Max</label>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button
                    onClick={() => updateSettings('betsyIRAMax', 7000)}
                    style={{
                      flex: 1,
                      padding: '14px',
                      borderRadius: '10px',
                      border: settings.betsyIRAMax === 7000 ? '2px solid #A855F7' : '1px solid var(--border)',
                      background: settings.betsyIRAMax === 7000 ? 'rgba(168, 85, 247, 0.08)' : 'var(--bg-subtle)',
                      cursor: 'pointer',
                      transition: 'all 0.2s'
                    }}
                  >
                    <div style={{ fontSize: '18px', fontWeight: '700', color: settings.betsyIRAMax === 7000 ? '#A855F7' : 'var(--text-secondary)' }}>$7,000</div>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px' }}>Under 50</div>
                  </button>
                  <button
                    onClick={() => updateSettings('betsyIRAMax', 8000)}
                    style={{
                      flex: 1,
                      padding: '14px',
                      borderRadius: '10px',
                      border: settings.betsyIRAMax === 8000 ? '2px solid #A855F7' : '1px solid var(--border)',
                      background: settings.betsyIRAMax === 8000 ? 'rgba(168, 85, 247, 0.08)' : 'var(--bg-subtle)',
                      cursor: 'pointer',
                      transition: 'all 0.2s'
                    }}
                  >
                    <div style={{ fontSize: '18px', fontWeight: '700', color: settings.betsyIRAMax === 8000 ? '#A855F7' : 'var(--text-secondary)' }}>$8,000</div>
                    <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '2px' }}>Age 50+</div>
                  </button>
                </div>
              </div>

              <div style={{ background: 'rgba(247, 147, 26, 0.08)', padding: '16px', borderRadius: '12px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' }}>
                  <span style={{ fontSize: '20px' }}>{'\u{20BF}'}</span>
                  <span style={{ fontSize: '12px', fontWeight: '600', color: 'var(--text-secondary)' }}>Betsy's Bitcoin (20%)</span>
                </div>
                <div style={{ fontSize: '24px', fontWeight: '700', color: '#F7931A' }}>${Math.round((settings.betsyIRAMax / 4) / 12)}<span style={{ fontSize: '14px', color: 'var(--text-muted)' }}>/mo</span></div>
                <div style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '4px' }}>{formatCurrency(settings.betsyIRAMax / 4)}/year</div>
              </div>
            </div>
          </div>

        </div>
      );
    }

    function Row({ label, value, muted, positive }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
          <span style={{ fontSize: '14px', color: 'var(--text-muted)' }}>{label}</span>
          <span style={{ fontWeight: '500', color: muted ? 'var(--text-muted)' : positive ? 'var(--positive-dark)' : 'var(--text-secondary)' }}>{value}</span>
        </div>
      );
    }

    function Stat({ label, value, small, negative }) {
      return (
        <div style={{ background: 'var(--bg-subtle)', padding: '14px', borderRadius: '10px' }}>
          <p style={{ fontSize: '11px', color: 'var(--text-muted)', margin: 0 }}>{label}</p>
          <p style={{ fontWeight: '600', fontSize: small ? '12px' : '16px', marginTop: small ? '4px' : '2px', color: negative ? 'var(--negative)' : 'var(--text-secondary)', margin: '4px 0 0 0' }}>{value}</p>
        </div>
      );
    }

    function SettingInput({ label, value, onChange, hint }) {
      return (
        <div>
          <label style={{ fontSize: '12px', fontWeight: '500', color: 'var(--text-muted)' }}>{label}</label>
          <div style={{ position: 'relative', marginTop: '6px' }}>
            <span style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)', color: 'var(--text-muted)' }}>$</span>
            <input type="number" value={value || ''} onChange={(e) => onChange(e.target.value)} style={{ width: '100%', paddingLeft: '36px', paddingRight: '14px', paddingTop: '12px', paddingBottom: '12px', fontSize: '18px', fontWeight: '600' }} />
          </div>
          {hint && <p style={{ fontSize: '11px', color: 'var(--text-subtle)', marginTop: '6px' }}>{hint}</p>}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
